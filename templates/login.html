<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — Language Learning AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#07080f;color:#e2e0ff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

.orbs{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.18;animation:float var(--d,18s) ease-in-out infinite alternate}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,#2563eb,#7c3aed);top:-150px;left:-150px;--d:20s}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,#7c3aed,#a21caf);bottom:-100px;right:-100px;--d:17s;animation-delay:-5s}
@keyframes float{0%{transform:translate(0,0)}100%{transform:translate(50px,40px)}}

.card{position:relative;z-index:1;width:100%;max-width:420px;margin:20px;background:rgba(12,10,28,.9);border:1px solid rgba(124,58,237,.25);border-radius:20px;padding:36px 32px;backdrop-filter:blur(24px);box-shadow:0 20px 60px rgba(0,0,0,.5)}

.logo{text-align:center;margin-bottom:28px}
.logo-icon{width:52px;height:52px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5em;margin:0 auto 12px;box-shadow:0 6px 20px rgba(124,58,237,.4)}
.logo-name{font-size:1.1em;font-weight:700;color:#e2e0ff}
.logo-sub{font-size:.75em;color:rgba(167,139,250,.5);margin-top:2px}

/* Tabs */
.tabs{display:flex;gap:0;background:rgba(255,255,255,.04);border-radius:10px;padding:4px;margin-bottom:26px}
.tab{flex:1;padding:8px;border:none;border-radius:7px;background:transparent;color:rgba(167,139,250,.5);font-family:'Inter',sans-serif;font-size:.84em;font-weight:600;cursor:pointer;transition:.2s}
.tab.active{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;box-shadow:0 3px 12px rgba(124,58,237,.35)}

/* Form */
.form-group{margin-bottom:16px}
label{display:block;font-size:.76em;font-weight:600;color:rgba(167,139,250,.65);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
input{width:100%;background:rgba(255,255,255,.05);border:1.5px solid rgba(124,58,237,.25);border-radius:10px;color:#e2e0ff;font-family:'Inter',sans-serif;font-size:.9em;padding:11px 14px;outline:none;transition:.2s}
input:focus{border-color:rgba(124,58,237,.6);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
input::placeholder{color:rgba(167,139,250,.3)}

.btn-submit{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;font-family:'Inter',sans-serif;font-size:.92em;font-weight:700;cursor:pointer;transition:.2s;margin-top:6px;box-shadow:0 4px 18px rgba(124,58,237,.4);letter-spacing:.02em}
.btn-submit:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 24px rgba(124,58,237,.55)}
.btn-submit:disabled{opacity:.45;cursor:not-allowed;transform:none}

.error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:8px;color:#fca5a5;font-size:.8em;padding:9px 12px;margin-bottom:14px;display:none}
.error-msg.show{display:block}
.success-msg{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);border-radius:8px;color:#86efac;font-size:.8em;padding:9px 12px;margin-bottom:14px;display:none}
.success-msg.show{display:block}

.divider{text-align:center;font-size:.75em;color:rgba(109,95,199,.4);margin:18px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:rgba(124,58,237,.15)}
.divider::before{left:0}.divider::after{right:0}
</style>
</head>
<body>
<div class="orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🌐</div>
    <div class="logo-name">Language Learning AI</div>
    <div class="logo-sub">Multi-Agent System</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Sign In</button>
    <button class="tab"        onclick="switchTab('register')">Create Account</button>
  </div>

  <div id="error-box"   class="error-msg"></div>
  <div id="success-box" class="success-msg"></div>

  <!-- Login -->
  <form id="login-form" onsubmit="doLogin(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="l-username" placeholder="your username" autocomplete="username" required/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="l-password" placeholder="••••••••" autocomplete="current-password" required/>
    </div>
    <button type="submit" class="btn-submit" id="login-btn">Sign In</button>
  </form>

  <!-- Register -->
  <form id="register-form" style="display:none" onsubmit="doRegister(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="r-username" placeholder="choose a username" autocomplete="username" required/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="r-email" placeholder="you@example.com" autocomplete="email" required/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="r-password" placeholder="min. 6 characters" autocomplete="new-password" required/>
    </div>
    <button type="submit" class="btn-submit" id="register-btn">Create Account</button>
  </form>
</div>

<script>
function switchTab(tab) {
  document.getElementById('login-form').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register'));
  });
  clearMsgs();
}

function showError(msg)   { const b=document.getElementById('error-box');   b.textContent=msg; b.classList.add('show'); document.getElementById('success-box').classList.remove('show'); }
function showSuccess(msg) { const b=document.getElementById('success-box'); b.textContent=msg; b.classList.add('show'); document.getElementById('error-box').classList.remove('show'); }
function clearMsgs()      { document.getElementById('error-box').classList.remove('show'); document.getElementById('success-box').classList.remove('show'); }

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const res  = await fetch('/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username: document.getElementById('l-username').value, password: document.getElementById('l-password').value }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'Login failed.'); return; }
    localStorage.setItem('token', data.token);
    localStorage.setItem('user',  JSON.stringify(data.user));
    window.location.href = '/';
  } catch(err) {
    showError('Network error. Is the server running?');
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

async function doRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('register-btn');
  btn.disabled = true; btn.textContent = 'Creating account…';
  try {
    const res  = await fetch('/auth/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        username: document.getElementById('r-username').value,
        email:    document.getElementById('r-email').value,
        password: document.getElementById('r-password').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'Registration failed.'); return; }
    localStorage.setItem('token', data.token);
    localStorage.setItem('user',  JSON.stringify(data.user));
    showSuccess('Account created! Redirecting…');
    setTimeout(() => window.location.href = '/', 1000);
  } catch(err) {
    showError('Network error. Is the server running?');
  } finally {
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}

// If already logged in, go home
if (localStorage.getItem('token')) window.location.href = '/';
</script>
</body>
</html>
